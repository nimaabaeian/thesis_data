# Portable, analysis-only lock. Resolved by `pip install --target <clean dir> -r requirements.txt`
# into an isolated location that does not consult or inherit the host's existing site-packages,
# so this is exactly the transitive closure of the 11 packages in requirements.txt — not a
# `pip freeze` of a shared development machine's full environment. No `file://` local-channel
# paths and no unrelated packages. Regenerate with:
#   rm -rf /tmp/lockdir && python -m pip install --target /tmp/lockdir -r analysis/requirements.txt
#   (list */*.dist-info, format name==version, sort)
